name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "mobile/capacitor/**"
      - ".github/workflows/android-mobile.yml"

jobs:
  android-debug:
    name: Android debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/capacitor

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile dependencies
        run: npm install

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: mobile/capacitor/android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafacar-android-debug-apk
          path: mobile/capacitor/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
